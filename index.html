<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Bharat Nova AI</title>
<meta name="theme-color" content="#000000"/>
<meta name="description" content="Bharat Nova AI — 7-engine AI chatbot with automatic failsafe fallback."/>
<link rel="manifest" href="./manifest.json"/>
<link rel="icon" href="/icon.png"/>
<link rel="apple-touch-icon" href="/icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Bharat AI"/>
<meta name="mobile-web-app-capable" content="yes"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{
  --bg:#000000;
  --panel:#0a0a0a;
  --panel2:#121212;
  --border:#2a2a2a;
  --border2:#3a3a3a;
  --accent:#FF8C00;
  --accent2:#FFB347;
  --text:#f3f3f3;
  --dim:#9a9a9a;
  --faint:#5e5e5e;
  --danger:#ff5252;
  --green:#36d399;
  --sw:272px;
  --th:58px;
  --ih:78px;
  --ff:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  --fm:ui-monospace,SFMono-Regular,'JetBrains Mono',Menlo,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-text-size-adjust:100%;}
body{
  font-family:var(--ff);
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  overflow:hidden;
}
/* ── APP SHELL: fixed-height flexbox column.
   Header + input bar are locked (flex:none), the chat
   pane is the only scrollable region (flex:1). This is
   the CRITICAL scroll fix — no position:fixed stacking,
   no top/bottom math, no jumping on mobile during
   streaming or with the on-screen keyboard open. ── */
#appShell{
  height:100dvh;height:100vh;
  display:flex;flex-direction:column;
  position:relative;z-index:1;
  margin-left:0;transition:margin-left .25s ease;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
button{font-family:inherit;}

/* ── SIDEBAR ───────────────────────────── */
#sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sw);
  background:var(--panel);
  border-right:1px solid var(--border);
  z-index:300;display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .25s ease;
}
#sidebar.open{transform:translateX(0);}
.sb-head{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--border);}
.sb-logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#000;font-size:1.05rem;flex-shrink:0;
  box-shadow:0 0 18px rgba(255,140,0,.45);
}
.sb-logo-text{font-weight:800;font-size:1rem;letter-spacing:.01em;}
.sb-logo-text em{color:var(--accent);font-style:normal;}
.new-btn{
  margin:12px;padding:11px 14px;border-radius:11px;border:1px solid var(--border2);
  background:linear-gradient(135deg,var(--accent),#cc6f00);
  color:#000;font-weight:700;font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 16px rgba(255,140,0,.25);
}
.new-btn:hover{filter:brightness(1.08);}
.hist-label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding:6px 14px 4px;font-weight:700;}
.hist-list{flex:1;overflow-y:auto;padding:0 8px;}
.hist-item{
  display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:9px;
  cursor:pointer;color:var(--dim);font-size:.83rem;
}
.hist-item:hover{background:var(--panel2);color:var(--text);}
.hist-item.active{background:rgba(255,140,0,.12);color:var(--text);border:1px solid rgba(255,140,0,.25);}
.hist-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-del{background:none;border:none;color:var(--faint);font-size:.75rem;cursor:pointer;opacity:0;padding:2px 4px;}
.hist-item:hover .hist-del{opacity:1;}
.hist-del:hover{color:var(--danger);}
.sb-foot{border-top:1px solid var(--border);padding:10px;display:flex;flex-direction:column;gap:6px;}
.sb-user{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;}
.sb-user-av{
  width:30px;height:30px;border-radius:50%;background:var(--panel2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:var(--accent);flex-shrink:0;
}
.sb-user-meta{flex:1;overflow:hidden;}
.sb-user-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-email{font-size:.7rem;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-btn{
  background:none;border:none;color:var(--dim);font-size:.82rem;font-weight:600;cursor:pointer;
  padding:9px 10px;border-radius:9px;display:flex;align-items:center;gap:8px;text-align:left;
}
.sb-btn:hover{background:var(--panel2);color:var(--text);}
.sb-btn.danger:hover{color:var(--danger);background:rgba(255,82,82,.08);}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:290;opacity:0;pointer-events:none;transition:opacity .25s;}
#overlay.on{opacity:1;pointer-events:all;}

/* ── HEADER ────────────────────────────── */
#header{
  position:relative;
  flex:0 0 var(--th);height:var(--th);width:100%;z-index:100;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  background:rgba(0,0,0,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.icon-btn{
  width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--panel);
  color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:1rem;
}
.icon-btn:hover{border-color:var(--border2);background:var(--panel2);}
.header-title{font-weight:800;font-size:1rem;display:flex;align-items:baseline;gap:6px;}
.header-title em{color:var(--accent);font-style:normal;}
.header-sub{font-size:.68rem;color:var(--faint);font-weight:600;}
/* Header model-switcher pill: same component as before, just relocated
   and re-tuned to a moderate, compact size that fits the header row. */
#header .model-pill{
  margin-left:auto;flex-shrink:0;
  padding:7px 10px;border-radius:12px;font-size:.76rem;max-width:128px;
}

/* ── CHAT AREA ─────────────────────────── */
#chatWrap{
  flex:1 1 auto;min-height:0;width:100%;
  overflow-y:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;will-change:scroll-position;
}
#chatInner{max-width:760px;margin:0 auto;padding:22px 16px 30px;display:flex;flex-direction:column;gap:18px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:60vh;gap:14px;color:var(--dim);}
.empty-state .big-icon{
  width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900;color:#000;
  box-shadow:0 0 30px rgba(255,140,0,.35);
}
.empty-state h2{color:var(--text);font-size:1.2rem;font-weight:800;}
.empty-state p{font-size:.85rem;max-width:320px;line-height:1.5;}

.msg-row{display:flex;gap:10px;}
.msg-row.user{flex-direction:row-reverse;}
.avatar{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:800;
}
.avatar.user{background:var(--panel2);border:1px solid var(--border2);color:var(--text);}
.avatar.ai{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.bubble-col{display:flex;flex-direction:column;gap:5px;max-width:80%;}
.msg-row.user .bubble-col{align-items:flex-end;}
.bubble{
  padding:11px 14px;border-radius:14px;font-size:.92rem;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;
}
.msg-row.user .bubble{background:var(--accent);color:#000;border-bottom-right-radius:4px;font-weight:500;}
.msg-row.ai .bubble{background:var(--panel);border:1px solid var(--border);border-bottom-left-radius:4px;}
.bubble.error{border-color:rgba(255,82,82,.4);background:rgba(255,82,82,.06);color:#ffb3b3;}
.bubble code{background:rgba(255,255,255,.08);padding:2px 5px;border-radius:5px;font-family:var(--fm);font-size:.85em;}
.bubble pre{background:#000;border:1px solid var(--border);border-radius:10px;padding:10px 12px;overflow-x:auto;margin:4px 0;}
.bubble pre code{background:none;padding:0;}
.msg-meta{display:flex;align-items:center;gap:8px;font-size:.68rem;color:var(--faint);padding:0 3px;}
.fallback-note{
  font-size:.68rem;color:var(--accent2);background:rgba(255,140,0,.08);border:1px solid rgba(255,140,0,.2);
  padding:4px 9px;border-radius:7px;display:inline-flex;align-items:center;gap:5px;width:fit-content;
}
.copy-btn{background:none;border:none;color:var(--faint);font-size:.68rem;cursor:pointer;padding:2px 4px;}
.copy-btn:hover{color:var(--text);}
.typing{display:flex;gap:4px;padding:13px 14px;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:tb 1.3s infinite ease-in-out;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}

/* ── INPUT BAR ─────────────────────────── */
#inputBar{
  flex:0 0 auto;width:100%;z-index:100;
  background:rgba(0,0,0,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  padding:10px 16px calc(10px + env(safe-area-inset-bottom,0));
}
#inputInner{max-width:760px;margin:0 auto;position:relative;}
#composer{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--panel);border:1px solid var(--border2);border-radius:18px;
  padding:8px 8px 8px 6px;
}
/* ── MODEL SELECTOR PILL (inside the input bar) ── */
.model-pill{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  background:var(--panel2);border:1px solid var(--border2);border-radius:13px;
  padding:8px 10px;cursor:pointer;font-size:.78rem;font-weight:700;color:var(--text);
  max-width:118px;
}
.model-pill:hover{border-color:var(--accent);}
.model-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.model-pill .mp-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.model-pill .mp-chev{margin-left:auto;color:var(--faint);font-size:.65rem;flex-shrink:0;}
#engineMenu{
  position:absolute;top:calc(100% + 10px);right:14px;width:230px;
  background:#0d0d0d;border:1px solid var(--border2);border-radius:14px;
  box-shadow:0 10px 40px rgba(0,0,0,.6);padding:6px;display:none;z-index:150;
  max-height:340px;overflow-y:auto;
}
#engineMenu.open{display:block;}
.engine-opt{
  display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:9px;cursor:pointer;font-size:.85rem;
}
.engine-opt:hover{background:var(--panel2);}
.engine-opt.active{background:rgba(255,140,0,.12);color:var(--accent2);}
.engine-opt .model-dot{width:9px;height:9px;}
.engine-opt .eo-name{font-weight:700;}
.engine-opt .eo-sub{font-size:.68rem;color:var(--faint);}
#msgInput{
  flex:1;resize:none;border:none;outline:none;background:transparent;color:var(--text);
  font-family:inherit;font-size:.92rem;line-height:1.4;max-height:140px;padding:9px 4px;
}
#msgInput::placeholder{color:var(--faint);}
#sendBtn{
  width:38px;height:38px;border-radius:50%;border:none;flex-shrink:0;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
}
#sendBtn:disabled{opacity:.4;cursor:default;}
.input-hint{font-size:.65rem;color:var(--faint);text-align:center;margin-top:6px;}

/* ── PLUS BUTTON + FLOATING ATTACH MENU (sits where the model
   pill used to be, in the bottom composer bar) ── */
.plus-wrap{position:relative;flex-shrink:0;}
.plus-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--panel2);
  color:var(--text);font-size:1.4rem;font-weight:300;cursor:pointer;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:transform .18s ease,background .15s ease,border-color .15s ease,color .15s ease;
}
.plus-btn:hover{border-color:var(--accent);background:var(--panel);}
.plus-btn.active{transform:rotate(45deg);border-color:var(--accent);color:var(--accent);}
.attach-menu{
  position:absolute;bottom:calc(100% + 10px);left:0;width:188px;
  background:#0d0d0d;border:1px solid var(--border2);border-radius:14px;
  box-shadow:0 10px 40px rgba(0,0,0,.6);padding:6px;
  display:flex;flex-direction:column;gap:2px;z-index:60;
  opacity:0;transform:translateY(8px) scale(.96);pointer-events:none;
  transition:opacity .18s ease,transform .18s ease;
}
.attach-menu.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}
.attach-opt{
  display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:9px;cursor:pointer;
  font-size:.86rem;font-weight:600;color:var(--text);
}
.attach-opt:hover{background:var(--panel2);}
.attach-ico{font-size:1.05rem;width:22px;text-align:center;flex-shrink:0;}

/* ── ATTACHMENT PREVIEW (shown above the composer before sending) ── */
.attach-preview-wrap{padding:0 2px 8px;}
.attach-preview{display:inline-flex;}
.attach-item{position:relative;display:inline-flex;}
.attach-thumb{
  width:64px;height:64px;border-radius:12px;object-fit:cover;
  border:1px solid var(--border2);background:var(--panel2);display:block;
}
.attach-file-chip{
  display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border2);
  border-radius:12px;padding:11px 14px 11px 12px;font-size:.78rem;font-weight:600;max-width:220px;
}
.attach-file-chip .afc-ico{font-size:1.05rem;flex-shrink:0;}
.attach-file-chip .afc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attach-remove{
  position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;
  background:#1a1a1a;border:1px solid var(--border2);color:var(--text);font-size:.65rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;
}
.attach-remove:hover{background:var(--danger);border-color:var(--danger);color:#fff;}

/* ── ATTACHMENTS RENDERED INSIDE A SENT CHAT BUBBLE ── */
.bubble-attach-img{
  max-width:220px;max-height:220px;border-radius:12px;border:1px solid var(--border2);
  display:block;margin-bottom:6px;object-fit:cover;
}
.bubble-attach-file{
  display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--border2);
  border-radius:11px;padding:8px 11px;font-size:.78rem;font-weight:600;margin-bottom:6px;max-width:220px;
}

/* ── TOASTS ────────────────────────────── */
#toastWrap{position:fixed;top:calc(var(--th) + 10px);right:14px;z-index:500;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.toast{
  background:#0d0d0d;border:1px solid rgba(255,140,0,.35);color:var(--text);
  padding:10px 14px;border-radius:11px;font-size:.78rem;max-width:300px;
  box-shadow:0 8px 28px rgba(0,0,0,.6);animation:toastIn .25s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* ── AUTH SCREEN ───────────────────────── */
#authScreen{
  position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;
  align-items:center;justify-content:center;padding:20px;
}
.auth-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:30px 26px;}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px;}
.auth-logo .sb-logo-icon{width:52px;height:52px;font-size:1.4rem;}
.auth-logo h1{font-size:1.25rem;font-weight:800;}
.auth-logo h1 em{color:var(--accent);font-style:normal;}
.auth-logo p{font-size:.78rem;color:var(--dim);}
.auth-tabs{display:flex;border:1px solid var(--border2);border-radius:11px;overflow:hidden;margin-bottom:18px;}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:.82rem;font-weight:700;color:var(--dim);cursor:pointer;background:var(--panel2);}
.auth-tab.active{background:var(--accent);color:#000;}
.auth-field{margin-bottom:12px;}
.auth-field label{font-size:.72rem;color:var(--dim);display:block;margin-bottom:5px;font-weight:600;}
.auth-field input{
  width:100%;background:#000;border:1px solid var(--border2);border-radius:9px;padding:10px 12px;
  color:var(--text);font-size:.88rem;outline:none;
}
.auth-field input:focus{border-color:var(--accent);}
.pw-row{position:relative;}
.pw-row button{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--faint);cursor:pointer;font-size:.85rem;
}
.auth-err{font-size:.74rem;color:var(--danger);margin:-4px 0 10px;display:none;}
.auth-err.on{display:block;}
.auth-submit{
  width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-weight:800;font-size:.88rem;cursor:pointer;margin-top:4px;
}
.auth-submit:disabled{opacity:.6;}
.auth-spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:-2px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(min-width:860px){
  #sidebar{transform:translateX(0);}
  #appShell{margin-left:var(--sw);}
}
</style>
</head>
<body>

<!-- ══════════ SIDEBAR ══════════ -->
<div id="overlay" onclick="closeSidebar()"></div>
<div id="sidebar">
  <div class="sb-head">
    <div class="sb-logo-icon">N</div>
    <div class="sb-logo-text">Bharat <em>Nova</em> AI</div>
  </div>
  <button class="new-btn" onclick="newChat()">+ New Chat</button>
  <div class="hist-label">History</div>
  <div class="hist-list" id="histList"></div>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-user-av" id="sbUserAv">?</div>
      <div class="sb-user-meta">
        <div class="sb-user-name" id="sbUserName">—</div>
        <div class="sb-user-email" id="sbUserEmail">—</div>
      </div>
    </div>
    <button class="sb-btn danger" onclick="doSignOut()">↩ Sign Out</button>
  </div>
</div>

<!-- ══════════ APP SHELL (locked flexbox: header + input fixed, chat scrolls) ══════════ -->
<div id="appShell">

<!-- ══════════ HEADER ══════════ -->
<div id="header">
  <button class="icon-btn" id="hamburgerBtn" onclick="toggleSidebar()">☰</button>
  <div style="flex:1;min-width:0;">
    <div class="header-title">Bharat <em>Nova</em> AI</div>
    <div class="header-sub" id="headerSub">7-Engine · Auto-Failsafe</div>
  </div>
  <div class="model-pill" id="modelPill" onclick="toggleEngineMenu()">
    <span class="model-dot" id="pillDot"></span>
    <span class="mp-name" id="pillName">Groq</span>
    <span class="mp-chev">▾</span>
  </div>
  <div id="engineMenu"></div>
</div>

<!-- ══════════ CHAT AREA (only scrollable region) ══════════ -->
<div id="chatWrap">
  <div id="chatInner"></div>
</div>

<!-- ══════════ TOASTS ══════════ -->
<div id="toastWrap"></div>

<!-- ══════════ INPUT BAR ══════════ -->
<div id="inputBar">
  <div id="inputInner">
    <div class="attach-preview-wrap" id="attachPreviewWrap" style="display:none;">
      <div class="attach-preview" id="attachPreview"></div>
    </div>
    <div id="composer">
      <div class="plus-wrap" id="plusWrap">
        <button class="plus-btn" id="plusBtn" type="button" onclick="toggleAttachMenu(event)" aria-label="Add attachment">+</button>
        <div class="attach-menu" id="attachMenu">
          <div class="attach-opt" onclick="triggerPicker('photo')"><span class="attach-ico">🖼️</span><span>Photos</span></div>
          <div class="attach-opt" onclick="triggerPicker('camera')"><span class="attach-ico">📷</span><span>Camera</span></div>
          <div class="attach-opt" onclick="triggerPicker('file')"><span class="attach-ico">📄</span><span>File</span></div>
        </div>
      </div>
      <textarea id="msgInput" rows="1" placeholder="Message Bharat Nova AI…"
        onkeydown="onInputKeydown(event)" oninput="autoGrow(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>

/* ══════════════════════════════════════════
   FILE / IMAGE → BASE64 PROCESSING
   Images are downscaled + re-encoded as JPEG on a
   canvas before becoming base64, so uploads stay
   small and fast even from a 12MP phone camera.
   Generic files are read as-is (size-capped).
══════════════════════════════════════════ */
const MAX_RAW_FILE_BYTES = 6 * 1024 * 1024;      // pre-read cap for non-image files
const MAX_ATTACHMENT_BASE64_CHARS = 8000000;      // ~6MB raw after base64 inflation

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
    reader.onerror = () => reject(new Error('Could not read the file.'));
    reader.readAsDataURL(file);
  });
}
function compressImageToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX_EDGE = 1280;
        let { width, height } = img;
        if (width > MAX_EDGE || height > MAX_EDGE) {
          if (width >= height) { height = Math.round(height * (MAX_EDGE / width)); width = MAX_EDGE; }
          else { width = Math.round(width * (MAX_EDGE / height)); height = MAX_EDGE; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        const mimeType = 'image/jpeg';
        const dataUrl = canvas.toDataURL(mimeType, 0.78);
        resolve({ base64: dataUrl.split(',')[1] || '', mimeType, dataUrl });
      };
      img.onerror = () => reject(new Error('Could not decode that image.'));
      img.src = String(reader.result);
    };
    reader.onerror = () => reject(new Error('Could not read the image.'));
    reader.readAsDataURL(file);
  });
}
async function handleFileSelect(ev){
  const input = ev.target;
  const file = input.files && input.files[0];
  input.value = ''; // reset so the same file can be re-picked later
  if (!file) return;

  const isImage = file.type.startsWith('image/');
  try {
    if (isImage) {
      const { base64, mimeType, dataUrl } = await compressImageToBase64(file);
      setPendingAttachment({ base64, mimeType, dataUrl, name: file.name, isImage: true });
    } else {
      if (file.size > MAX_RAW_FILE_BYTES) {
        showToast('That file is too large (max ~6MB). Please choose a smaller file.');
        return;
      }
      const base64 = await fileToBase64(file);
      if (base64.length > MAX_ATTACHMENT_BASE64_CHARS) {
        showToast('That file is too large (max ~6MB). Please choose a smaller file.');
        return;
      }
      setPendingAttachment({ base64, mimeType: file.type || 'application/octet-stream', name: file.name, isImage: false });
    }
  } catch (err) {
    showToast(err?.message || 'Could not process that file.');
  }
}

  renderAttachPreview();
}

}

/* ══════════════════════════════════════════
   LIGHTWEIGHT MARKDOWN-ISH RENDERING
══════════════════════════════════════════ */
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderMarkdownLite(raw){
  let s = escapeHtml(raw);
  s = s.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  s = s.replace(/\*([^*]+)\*/g, '<i>$1</i>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

/* ══════════════════════════════════════════
   CHAT STORAGE (per Firebase user, localStorage)
══════════════════════════════════════════ */
function storageKey(){ return `bn_chats_${currentUser ? currentUser.uid : 'anon'}`; }
function loadChats(){
  try { chats = JSON.parse(localStorage.getItem(storageKey())) || []; } catch { chats = []; }
}
function saveChats(){
  localStorage.setItem(storageKey(), JSON.stringify(chats));
}
function getActiveChat(){
  return chats.find(c => c.id === activeChatId) || null;
}
function newChat(){
  const chat = { id: 'c_' + Date.now(), title: 'New chat', messages: [], createdAt: Date.now() };
  chats.unshift(chat);
  activeChatId = chat.id;
  saveChats();
  renderHistory();
  renderMessages();
  closeSidebar();
  document.getElementById('msgInput').focus();
}
function switchChat(id){
  activeChatId = id;

  closeSidebar();
}
function deleteChat(id, ev){
  ev.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  saveChats();
  if (activeChatId === id) {
    activeChatId = chats.length ? chats[0].id : null;
    if (!activeChatId) newChat();
  }
  renderHistory();
  renderMessages();
}
function renderHistory(){
  const list = document.getElementById('histList');
  if (!chats.length) { list.innerHTML = '<div style="color:var(--faint);font-size:.78rem;padding:8px 10px;">No chats yet</div>'; return; }
  list.innerHTML = chats.map(c => `
    <div class="hist-item ${c.id===activeChatId?'active':''}" onclick="switchChat('${c.id}')">
      <span class="hist-title">${escapeHtml(c.title || 'New chat')}</span>
      <button class="hist-del" onclick="deleteChat('${c.id}', event)">✕</button>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════
   MESSAGE RENDERING
══════════════════════════════════════════ */
function renderMessages(){
  const inner = document.getElementById('chatInner');
  const chat = getActiveChat();
  if (!chat || !chat.messages.length) {
    inner.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">N</div>
        <h2>Bharat Nova AI</h2>
        <p>Pick an engine from the pill in the input bar and start chatting. If your chosen engine ever fails, Nova automatically switches to a backup — no downtime.</p>
      </div>`;
    return;
  }
  inner.innerHTML = chat.messages.map((m, i) => renderBubble(m, i)).join('');
  scrollChatToBottom(true);
}
function renderBubble(m, idx){
  const isUser = m.role === 'user';
  const avatar = isUser
    ? `<div class="avatar user">YOU</div>`
    : `<div class="avatar ai">N</div>`;
  const bubbleClass = m.error ? 'bubble error' : 'bubble';
  const content = isUser ? escapeHtml(m.content) : renderMarkdownLite(m.content);
  const attachmentHtml = renderBubbleAttachment(m.attachment);
  const hasText = !!(m.content && m.content.trim());
  const fallbackNote = m.fallback
    ? `<div class="fallback-note">⚡ System: ${escapeHtml(m.requestedEngineName||'')} failed → auto-answered via ${escapeHtml(m.engineName||'')}</div>`
    : '';
  const copyBtn = !isUser ? `<button class="copy-btn" onclick="copyMsg(${idx})">Copy</button>` : '';
  return `
    <div class="msg-row ${isUser?'user':'ai'}">
      ${avatar}
      <div class="bubble-col">
        ${attachmentHtml}
        ${hasText || !attachmentHtml ? `<div class="${bubbleClass}">${content}</div>` : ''}
        ${fallbackNote}
        ${!isUser ? `<div class="msg-meta"><span>${escapeHtml(m.engineName||'')}</span>${copyBtn}</div>` : ''}
      </div>
    </div>`;
}
function renderBubbleAttachment(att){
  if (!att) return '';
  if (att.isImage && att.dataUrl) {
    return `<img class="bubble-attach-img" src="${att.dataUrl}" alt="Attached image"/>`;
  }
  return `<div class="bubble-attach-file">📄 ${escapeHtml(att.name || 'Attached file')}</div>`;
}
function copyMsg(idx){
  const chat = getActiveChat();
  if (!chat) return;
  const m = chat.messages[idx];
  if (m) navigator.clipboard?.writeText(m.content);
}
function showTyping(){
  const inner = document.getElementById('chatInner');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typingRow';
  row.innerHTML = `<div class="avatar ai">N</div><div class="bubble-col"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  inner.appendChild(row);
  scrollChatToBottom(true);
}
function hideTyping(){
  document.getElementById('typingRow')?.remove();
}

/* Only auto-scroll if the user is already near the bottom, so manual
   scroll-up to read history is never jittered or yanked back down. */
function isNearBottom(){
  const wrap = document.getElementById('chatWrap');
  return wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 120;
}
function scrollChatToBottom(force){
  const wrap = document.getElementById('chatWrap');
  if (force || isNearBottom()) {
    wrap.scrollTo({ top: wrap.scrollHeight, behavior: 'smooth' });
  }
}

/* ══════════════════════════════════════════
   INPUT HANDLING
══════════════════════════════════════════ */
function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
function onInputKeydown(ev){
  if (ev.key === 'Enter' && !ev.shiftKey) {
    ev.preventDefault();
    sendMessage();
  }
}

/* ══════════════════════════════════════════
   SEND MESSAGE → /api/server (auto-failsafe backend)
══════════════════════════════════════════ */
async function sendMessage(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  const attachment = pendingAttachment; // snapshot — current turn's attachment only
  if (!text && !attachment) return;

  let chat = getActiveChat();
  if (!chat) { newChat(); chat = getActiveChat(); }

  // Compact record kept in chat history for re-rendering the bubble.
  // Images keep their (already-compressed) preview; generic files only
  // keep their name/type, never re-sent on later turns.
  const attachmentForHistory = attachment ? {
    isImage: attachment.isImage,
    mimeType: attachment.mimeType,
    name: attachment.name,
    dataUrl: attachment.isImage ? attachment.dataUrl : null,
  } : null;

  chat.messages.push({ role:'user', content:text, attachment: attachmentForHistory });
  if (chat.title === 'New chat') {
    const fallbackTitle = attachment ? (attachment.isImage ? '📷 Photo' : `📄 ${attachment.name || 'File'}`) : 'New chat';
    chat.title = (text || fallbackTitle).slice(0, 40);
  }
  saveChats();
  renderHistory();
  renderMessages();

  input.value = '';
  autoGrow(input);
  clearAttachment();
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/server', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        engine: selectedEngine,
        temperature: 0.7,
        max_tokens: 1024,
        messages: chat.messages.map(m => ({ role:m.role, content:m.content })),
        ...(attachment ? { attachment: { mimeType: attachment.mimeType, data: attachment.base64, name: attachment.name } } : {}),
      }),
    });
    const data = await res.json();
    hideTyping();

    if (data.error) {
      chat.messages.push({ role:'assistant', content:`⚠️ ${data.message || 'All engines failed.'}`, error:true });
      showToast(`All engines failed for this request. Check your API keys in Vercel.`);
    } else {
      chat.messages.push({
        role:'assistant',
        content: data.reply,
        engine: data.engine,
        engineName: data.engineName,
        fallback: data.fallback,
        requestedEngineName: data.requestedEngineName,
      });
      if (data.fallback) {
        showToast(`System: ${data.requestedEngineName} failed. Automatically fetched answer via ${data.engineName}.`);
      }
    }
  } catch (err) {
    hideTyping();
    chat.messages.push({ role:'assistant', content:`⚠️ Network error: ${err?.message || 'request failed'}`, error:true });
  }

  saveChats();
  renderMessages();
  document.getElementById('sendBtn').disabled = false;
}
